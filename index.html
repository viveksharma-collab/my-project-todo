<!DOCTYPE html>
<html>
<head>
<title>Ultimate Todo Pro 🔥</title>

<style>
body {margin:0;font-family:sans-serif;background:#f5f7fb;}
.dark {background:#121212;color:white;}

.app {max-width:370px;margin:auto;background:white;height:100vh;overflow:auto;}
.dark .app{background:#1e1e1e;}

.header{background:#4c6ef5;color:white;padding:15px;display:flex;justify-content:space-between;}

.task{margin:10px;padding:10px;background:#eee;border-radius:10px;}
.dark .task{background:#2c2c2c;}

.done{text-decoration:line-through;background:#c8ffc8;}

button{margin:5px;padding:6px 10px;border:none;border-radius:8px;background:#4c6ef5;color:white;cursor:pointer;}

input,select{margin:5px;padding:8px;border-radius:8px;border:none;}

.progress{height:6px;background:#ddd;}
.bar{height:6px;background:green;width:0%;}

.bottom{padding:10px;text-align:center;font-weight:bold;}

.calendar {display:none;padding:10px;}
.day {display:inline-block;width:40px;height:40px;line-height:40px;margin:3px;border-radius:6px;background:#ddd;text-align:center;}
.green{background:limegreen;color:white;}
.red{background:red;color:white;}
</style>
</head>

<body>

<div class="app">

<div class="header">
<h3 id="welcome"></h3>
<div>
<button onclick="toggleDark()">🌙</button>
<button onclick="toggleCalendar()">📅</button>
</div>
</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<input id="taskInput" placeholder="Task...">
<input type="time" id="time">
<select id="cat">
<option>Work</option>
<option>Study</option>
<option>Personal</option>
</select>

<div>
<button onclick="quick('Gym 💪')">Gym</button>
<button onclick="quick('Study 📚')">Study</button>
<button onclick="quick('Water 💧')">Water</button>
<button onclick="quick('Walk 🚶')">Walk</button>
<button onclick="quick('Call 📞')">Call</button>
<button onclick="quick('Read 📖')">Read</button>
<button onclick="quick('Sleep 😴')">Sleep</button>
<button onclick="quick('Meditation 🧘')">Meditation</button>
</div>

<div id="tasks"></div>

<div id="stats"></div>
<div class="bottom" id="msg"></div>

<!-- CALENDAR -->
<div class="calendar" id="calendar"></div>

</div>

<script>

let name = localStorage.getItem("name") || prompt("Your name?");
localStorage.setItem("name", name);
document.getElementById("welcome").innerText="Hey "+name;

let todos = JSON.parse(localStorage.getItem("todos"))||[];
let xp = +localStorage.getItem("xp")||0;
let streak = +localStorage.getItem("streak")||0;
let history = JSON.parse(localStorage.getItem("history"))||{};

function today(){
let d=new Date();
return d.toISOString().split('T')[0];
}

function save(){
localStorage.setItem("todos",JSON.stringify(todos));
localStorage.setItem("xp",xp);
localStorage.setItem("streak",streak);
localStorage.setItem("history",JSON.stringify(history));
}

function add(){
if(todos.length>=10){show("Max 10 tasks");return;}
let t=document.getElementById("taskInput").value;
let time=document.getElementById("time").value;
let cat=document.getElementById("cat").value;
if(!t)return;

todos.push({t,done:false,time,cat});
save();showTasks();
}

function quick(t){
if(todos.length>=10){show("Max 10 tasks");return;}
todos.push({t,done:false});
save();showTasks();
}

function showTasks(){
let html="";let done=0;

todos.forEach((e,i)=>{
if(e.done)done++;

html+=`<div class="task ${e.done?'done':''}" ondblclick="doneTask(${i})">
${e.t} ⏰ ${e.time||''} [${e.cat||''}]
<button onclick="del(${i})">❌</button>
</div>`;
});

document.getElementById("tasks").innerHTML=html;

let p=todos.length?done/todos.length*100:0;
document.getElementById("bar").style.width=p+"%";

document.getElementById("stats").innerHTML=
`XP: ${xp} | Level: ${Math.floor(xp/10)} | Streak: ${streak}`;
}

function doneTask(i){
todos[i].done=!todos[i].done;
xp++;

let allDone = todos.every(t=>t.done);

if(allDone){
history[today()] = "green";
streak++;
show("🔥 Perfect day! Streak +1");
}else{
show("Nice progress!");
}

save();showTasks();renderCalendar();
}

function checkMissed(){
let t=today();
if(!history[t]){
history[t]="red";
}
save();
}

function renderCalendar(){
let cal=document.getElementById("calendar");
cal.innerHTML="";

for(let i=1;i<=30;i++){
let d=new Date();
d.setDate(i);
let key=d.toISOString().split('T')[0];

let cls="day";
if(history[key]=="green")cls+=" green";
if(history[key]=="red")cls+=" red";

cal.innerHTML+=`<div class="${cls}">${i}</div>`;
}
}

function toggleCalendar(){
let c=document.getElementById("calendar");
c.style.display = c.style.display=="block"?"none":"block";
renderCalendar();
}

function del(i){
todos.splice(i,1);save();showTasks();
}

function show(text){
let box=document.getElementById("msg");
box.innerHTML="";
let i=0;
function type(){
if(i<text.length){
box.innerHTML+=text[i++];
setTimeout(type,20);
}}
type();
}

function toggleDark(){
document.body.classList.toggle("dark");
}

setInterval(()=>{
let now=new Date().toTimeString().slice(0,5);
todos.forEach(t=>{
if(t.time==now && !t.done){
alert("⏰ "+t.t);
}
});
},60000);

// daily check
checkMissed();

showTasks();
renderCalendar();

</script>

</body>
</html>
