<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ultimate Todo Pro 🔥</title>

<style>
body {margin:0;font-family:sans-serif;background:#f5f7fb;}
.dark {background:#121212;color:white;}

.header {
    background:#4c6ef5;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.container {padding:10px;}

.input-row {display:flex;gap:5px;}
input {
    flex:1;
    padding:10px;
    border-radius:8px;
    border:none;
}

button {
    padding:10px;
    border:none;
    border-radius:8px;
    background:#4c6ef5;
    color:white;
}

.task {
    margin-top:10px;
    padding:12px;
    background:#eee;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}
.dark .task {background:#2c2c2c;}

.done {
    text-decoration:line-through;
    background:#c8ffc8;
}

.suggestions button {margin:3px;font-size:12px;}

.progress {height:5px;background:#ddd;}
.bar {height:5px;background:green;width:0%;}

.bottom {text-align:center;padding:10px;font-weight:bold;}

.calendar {display:none;padding:10px;}
.day {
    display:inline-block;
    width:40px;
    height:40px;
    margin:3px;
    text-align:center;
    line-height:40px;
    border-radius:6px;
    background:#ddd;
}
.green {background:limegreen;color:white;}
.red {background:red;color:white;}
</style>
</head>

<body>

<div class="header">
<h3 id="welcome"></h3>
<div>
<button onclick="toggleDark()">🌙</button>
<button onclick="toggleCalendar()">📅</button>
</div>
</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<div class="container">

<div id="message"></div>

<div class="input-row">
<input id="taskInput" placeholder="Add task..." disabled>
<button onclick="add()">+</button>
</div>

<div class="suggestions">
<button onclick="quick('Gym 💪')">Gym 💪</button>
<button onclick="quick('Study 📚')">Study 📚</button>
<button onclick="quick('Water 💧')">Water 💧</button>
<button onclick="quick('Meditation 🧘')">Meditation 🧘</button>
<button onclick="quick('Walk 🚶')">Walk 🚶</button>
<button onclick="quick('Call 📞')">Call 📞</button>
<button onclick="quick('Read 📖')">Read 📖</button>
<button onclick="quick('Sleep 😴')">Sleep 😴</button>
</div>

<div id="tasks"></div>
<div id="stats"></div>

<div class="bottom" id="bottomMsg"></div>

<div class="calendar" id="calendar"></div>

</div>

<script>

let username = localStorage.getItem("username") || prompt("Enter your name:");
localStorage.setItem("username", username);
document.getElementById("welcome").innerText="Hey "+username;

let todos = JSON.parse(localStorage.getItem("todos"))||[];
let xp = +localStorage.getItem("xp")||0;
let streak = +localStorage.getItem("streak")||0;
let history = JSON.parse(localStorage.getItem("history"))||{};
let lastDate = localStorage.getItem("lastDate") || today();

function today(){
return new Date().toISOString().split('T')[0];
}

// 🔥 DAY RESET
function checkNewDay(){
let t = today();

if(lastDate !== t){
    let allDone = todos.length>0 && todos.every(x=>x.done);

    if(allDone){
        history[lastDate] = "green";
        streak++;
    } else {
        history[lastDate] = "red";
        streak = 0;
    }

    todos = [];
    lastDate = t;
    localStorage.setItem("lastDate", t);

    showBottom("🌅 New Day, Fresh Start!");
    save();
}
}

function save(){
localStorage.setItem("todos",JSON.stringify(todos));
localStorage.setItem("xp",xp);
localStorage.setItem("streak",streak);
localStorage.setItem("history",JSON.stringify(history));
}

let startMsg = `🔥 Hey ${username}, start strong!`;
let i=0;

function typeStart(){
if(i<startMsg.length){
document.getElementById("message").innerHTML+=startMsg[i++];
setTimeout(typeStart,25);
}else{
document.getElementById("taskInput").disabled=false;
}
}

function add(){
if(todos.length>=10){showBottom("Max 10 tasks");return;}
let t=document.getElementById("taskInput").value;
if(!t)return;
todos.push({t,done:false});
document.getElementById("taskInput").value="";
save();show();
}

function quick(t){
if(todos.length>=10){showBottom("Max 10 tasks");return;}
todos.push({t,done:false});
save();show();
}

function show(){
let html="";let done=0;
todos.forEach((e,i)=>{
if(e.done) done++;
html+=`
<div class="task ${e.done?'done':''}" ondblclick="doneTask(${i})">
${e.t}
<button onclick="del(${i})">❌</button>
</div>`;
});
document.getElementById("tasks").innerHTML=html;

let percent=todos.length?done/todos.length*100:0;
document.getElementById("bar").style.width=percent+"%";

document.getElementById("stats").innerHTML=
`XP:${xp} | Level:${Math.floor(xp/10)} | Streak:${streak}`;
}

function doneTask(i){
todos[i].done=!todos[i].done;
xp++;

let remaining=todos.filter(t=>!t.done).length;

if(remaining==0){
showBottom(`🏁 Well done ${username}!`);
}else{
showBottom(`🔥 ${remaining} tasks left`);
}

save();show();
}

function del(i){
todos.splice(i,1);save();show();
}

function showBottom(text){
let box=document.getElementById("bottomMsg");
box.innerHTML="";
let i=0;
function type(){
if(i<text.length){
box.innerHTML+=text[i++];
setTimeout(type,20);
}}
type();
}

function toggleDark(){
document.body.classList.toggle("dark");
}

function renderCalendar(){
let cal=document.getElementById("calendar");
cal.innerHTML="";
for(let i=1;i<=30;i++){
let d=new Date();
d.setDate(i);
let key=d.toISOString().split('T')[0];

let cls="day";
if(history[key]=="green")cls+=" green";
if(history[key]=="red")cls+=" red";

cal.innerHTML+=`<div class="${cls}">${i}</div>`;
}
}

function toggleCalendar(){
let c=document.getElementById("calendar");
c.style.display=c.style.display=="block"?"none":"block";
renderCalendar();
}

// INIT
checkNewDay();
typeStart();
show();
renderCalendar();

</script>

</body>
</html>
